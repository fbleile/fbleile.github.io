<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to TUM Profile</title>

    <script data-goatcounter="https://fbleile.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

    <noscript>
        <img src="https://fbleile.goatcounter.com/count?p=/index&t=RedirectNoJS">
    </noscript>
    <img src="https://fbleile.goatcounter.com/count?p=/index&t=Redirect" style="display:none">

    <meta http-equiv="refresh" content="2; url=https://campus.tum.de/tumonline/visitenkarte.show_vcard?pPersonenId=21FD226BAA00CDD7&pPersonenGruppe=3">
    
    <script type="text/javascript">
        setTimeout(function() {
            window.location.href = "https://campus.tum.de/tumonline/visitenkarte.show_vcard?pPersonenId=21FD226BAA00CDD7&pPersonenGruppe=3";
        }, 2000);
    </script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f9f9f9;
            color: #333;
        }
        .container { text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0065BD; /* TUM Blue */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #0065BD; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div style="font-weight: 500;">Redirecting to TUM profile...</div>
        <p>If the page doesn't load, <a href="https://campus.tum.de/tumonline/visitenkarte.show_vcard?pPersonenId=21FD226BAA00CDD7&pPersonenGruppe=3">click here</a>.</p>
    </div>
</body>
</html>
